<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 500px;">
        <h3 class="text-center mb-4">Créer un Compte</h3>
        <!-- Afficher les messages d'erreur -->
        <div th:if="${error}" class="alert alert-danger" role="alert">
            <p th:text="${error}"></p>
        </div>
        <form th:action="@{/register}" th:object="${utilisateur}" method="post">
            <div class="mb-3">
                <label for="nom" class="form-label">Nom</label>
                <input type="text" th:field="*{nom}" class="form-control" id="nom" placeholder="Nom" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control" id="email" placeholder="Email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Mot de passe</label>
                <input type="password" th:field="*{password}" class="form-control" id="password" placeholder="Mot de passe" required>
            </div>
            <div class="mb-3">
                <label for="role" class="form-label">Rôle</label>
                <select th:field="*{role}" class="form-select" id="role" required>
                    <option th:each="role : ${T(com.example.gestion_evenement.Enums.Role).values()}"
                            th:value="${role}" th:text="${role}">
                    </option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100">S'inscrire</button>
            <div class="text-center mt-3">
                <p>Déjà inscrit ? <a href="/login">Connectez-vous</a></p>
            </div>
        </form>
    </div>
</div>
</body>
</html>
