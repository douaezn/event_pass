<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Événements</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
          background-image: url('/css/images/5.jpg'); /* Image d'arrière-plan */
          background-size: cover;
          background-attachment: fixed;
          background-repeat: no-repeat;
          color: #fff;
        }

        .card {
          background-color: rgba(201, 192, 203, 0.6); /* Plus de transparence */
          border-radius: 8px;
          box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
          transition: transform 0.3s ease, box-shadow 0.3s ease;
          height: 100%;
          display: flex;
          flex-direction: column;
          justify-content: space-between;
        }

        .card:hover {
          transform: scale(1.05);
        }

        .card-title {
          font-size: 1.5rem;
          color: #333; /* Couleur sombre */
          text-align: center;
          font-weight: bold;
        }

        .card-text {
          color: #333; /* Texte sombre */
          font-size: 1rem;
        }

        .btn-buy {
          background-color: #a16cad; /* Couleur personnalisée */
          border: none;
          color: #fff;
          padding: 10px 15px;
          border-radius: 5px;
          transition: background-color 0.3s ease;
        }

        .btn-buy:hover {
          background-color: #9e75ac; /* Couleur au survol */
          color: #000;
        }

        .navbar {
          background-color: rgba(108, 117, 125, 0.9); /* Gris foncé avec transparence */
        }

        .navbar-brand {
          color: #fff;
        }

        .nav-link {
          color: #fff;
        }

        .nav-link:hover {
          color: #ddd;
        }

    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="#">EventPass</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/home">Accueil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/profil">Mon Profil</a> <!-- Lien vers la page profil -->
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="/logout">Se Déconnecter</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div th:if="${error}" class="alert alert-danger">
    <span th:text="${error}"></span>
</div>

<div class="container mt-5">
    <div class="row g-4">
        <!-- Parcourir les événements dynamiquement -->
        <div class="col-md-4" th:each="evenement : ${evenements}">
            <div class="card">
                <div class="card-body">

                    <h5 class="card-title" th:text="${evenement.titre}">Titre de l'Événement</h5>
                    <p class="card-text">
                        <strong>Description:</strong> <span th:text="${evenement.description}">Lorem ipsum</span><br>
                        <strong>Date:</strong> <span th:text="${evenement.date}">2024-01-01</span><br>
                        <strong>Lieu:</strong> <span th:text="${evenement.lieu}">Lieu Exemple</span><br>
                        <strong>Places Disponibles:</strong> <span th:text="${evenement.placesDisponibles}">Lieu Exemple</span><br>

                        <strong>Prix:</strong> <span th:text="${evenement.prix + ' DH'}">100</span>
                    </p>
                    <div class="text-center">
                        <a th:href="@{'/achat/acheter/' + ${evenement.id}}" class="btn btn-buy">
                            Acheter
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
