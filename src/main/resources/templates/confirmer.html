<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Confirmation de Code</title>
    <!-- Lien Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <!-- Card pour le formulaire -->
            <div class="card shadow-sm">
                <div class="card-header text-center bg-primary text-white">
                    <h4>Confirmation de Code</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/confirmer/{id}(id=${id})}" method="post" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label for="code" class="form-label">Code de confirmation :</label>
                            <input type="text" id="code" name="code" class="form-control" placeholder="Entrez votre code" required>
                            <div class="invalid-feedback">
                                Le code de confirmation est obligatoire.
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Confirmer</button>
                    </form>
                </div>
            </div>
            <!-- Message de succès ou d'erreur -->
            <div th:if="${message}" class="alert alert-success mt-3" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>
        </div>
    </div>
</div>

<!-- Script Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Script pour activer les validations Bootstrap -->
<script>
    (function () {
        'use strict'
        const forms = document.querySelectorAll('.needs-validation')
        Array.from(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
    })()
</script>
</body>
</html>
