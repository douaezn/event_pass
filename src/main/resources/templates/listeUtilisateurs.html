<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liste des Utilisateurs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background-image: url('/css/images/hh.png'); /* Chemin correct */
      background-size: cover;
      background-attachment: fixed;
      background-repeat: no-repeat;
      color: #fff;
    }

    .card, .table {
      border-radius: 8px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      background-color: rgba(211, 211, 211, 0.7); /* Gris clair semi-transparent */
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .table {
      margin-top: 20px;
      color: #000; /* Texte noir */
      border-collapse: separate;
      border-spacing: 0 10px; /* Espacement entre les lignes */
      background-color: rgba(211, 211, 211, 0.7); /* Gris clair semi-transparent */
    }

    .table th {
      background-color: rgba(0, 0, 0, 0.85); /* Même gris que la barre de navigation */
      color: #fff;
      border: none;
      text-align: center;
      padding: 12px;
      font-weight: bold;
      border-top-left-radius: 8px; /* Coins arrondis pour un style moderne */
      border-top-right-radius: 8px;
    }

    .table td {
      background-color: rgba(211, 211, 211, 0.7); /* Gris clair similaire au box */
      color: #000; /* Texte noir pour contraste */
      text-align: center;
      padding: 12px;
      border: none;
    }

    .btn {
      margin-right: 5px;
      padding: 6px 10px;
      border-radius: 4px;
    }

    .btn-danger {
      background-color: #e74c3c;
      border-color: #e74c3c;
    }

    .btn-danger:hover {
      background-color: #c0392b;
      border-color: #c0392b;
    }

    .btn-sm i {
      margin-right: 4px;
    }

    .navbar {
      background-color: rgba(0, 0, 0, 0.85);
    }

    h2 {
      color: #f8f9fa;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
      text-align: center;
      margin-bottom: 20px;
    }

    .table-row:hover {
      background-color: rgba(169, 169, 169, 0.7); /* Gris plus foncé au survol */
      color: #000;
    }
    .icon-supprimer i {
    font-size: 18px;
    color: #000; /* Gris foncé */
    transition: color 0.3s ease, transform 0.3s ease;
    cursor: pointer;
  }

  .icon-supprimer i:hover {
    color: rgba(169, 169, 169, 1); /* Gris clair au survol */
    transform: scale(1.2); /* Légère agrandissement au survol */
  }
  </style>



</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Dashboard Admin</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/evenements/dashboard}">Liste des evenements</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-danger"  th:href="@{/logout}">Se Déconnecter</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h2 class="text-center mb-4">Liste des Utilisateurs</h2>
  <div class="row">
    <div class="col-12">
      <table class="table table-hover table-bordered">
        <thead>
        <tr>

          <th>Nom</th>
          <th>Email</th>
          <th>Rôle</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="utilisateur : ${utilisateurs}">
          <td th:text="${utilisateur.nom}">Doe</td>
          <td th:text="${utilisateur.email}">john.doe@example.com</td>
          <td th:text="${utilisateur.role}">Admin</td>
          <td>
            <a th:href="@{'/supprimer/' + ${utilisateur.id}}"
               class="icon-supprimer"
               onclick="return confirmerSuppression(event);">
              <i class="fas fa-trash-alt"></i>
            </a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  function confirmerSuppression(event) {
    event.preventDefault();
    const confirmation = confirm("Êtes-vous sûr de vouloir supprimer cet utilisateur ?");
    if (confirmation) {
      window.location.href = event.currentTarget.href;
    }
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
</body>
</html>
