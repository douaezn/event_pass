<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        /* Background settings */
        body {
            background-image: url('/css/images/5.jpg'); /* Remplacez par votre image */
            background-size: cover;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #fff;
        }

        /* Navbar style */
        .navbar {
            background-color: rgba(108, 117, 125, 0.9); /* Gris foncé avec transparence */
        }

        .navbar .navbar-brand {
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
        }

        .navbar .nav-link {
            color: #fff;
            transition: color 0.3s ease;
        }

        .navbar .nav-link:hover {
            color: #ddd; /* Légèrement plus clair au survol */
        }

        /* Box style */
        .box {
            background-color: rgba(201, 192, 203, 0.5); /* Plus de transparence */
            color: #000; /* Texte noir */
            padding: 30px; /* Augmenter l'espace intérieur */
            width: 80%; /* Largeur ajustée à 80% de la largeur parent */
            max-width: 900px; /* Limiter la largeur maximale */
            height: auto; /* Hauteur automatique */
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
            margin: 0 auto; /* Centrer horizontalement */
        }


        .box h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .box p {
            font-size: 1.2rem;
        }

        .btn-custom {
            background-color: #b48cbd; /* Couleur personnalisée */
            border-color: #b48cbd;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .btn-custom:hover {
            background-color: #9e75ac; /* Couleur au hover */
            color: #fff;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="#">EventPass</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#">Accueil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/profil">Mon Profil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="/logout">Se Déconnecter</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <div class="box">
        <h1>Bienvenue à EventPass !</h1>
        <p>Explorez les événements disponibles et participez à vos favoris.</p>
        <a class="btn btn-custom" th:href="@{/evenements/accueil}" role="button">Voir les Événements</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
