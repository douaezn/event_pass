<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récapitulatif de l'Achat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background-image: url('/css/images/5.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #fff;
        }

        .card {
            background-color: rgba(201, 192, 203, 0.8);
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            padding: 20px;
        }

        .btn-confirm {
            background-color: #a16cad;
            border: none;
            color: #fff;
            padding: 10px 15px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .btn-confirm:hover {
            background-color: #9e75ac;
            color: #000;
        }

        .form-label {
            font-weight: bold;
        }
        .navbar {
          background-color: rgba(108, 117, 125, 0.9); /* Gris foncé avec transparence */
        }

        .navbar-brand {
          color: #fff;
        }

        .nav-link {
          color: #fff;
        }

        .nav-link:hover {
          color: #ddd;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="#">EventPass</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/evenements/accueil">Accueil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="/logout">Se Déconnecter</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <h3 class="text-center mb-4">Récapitulatif de l'Achat</h3>
                <table class="table table-bordered">
                    <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Email</th>
                        <th>Quantité</th>
                        <th>Prix Total</th>
                        <th>Événement</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td th:text="${achat.nom}"></td>
                        <td th:text="${achat.email}"></td>
                        <td th:text="${achat.quantite}"></td>
                        <td th:text="${achat.prixTotal}"></td>
                        <td th:text="${achat.evenement.titre}"></td>
                    </tr>
                    </tbody>
                </table>

                <!-- Formulaire de paiement -->
                <h4 class="text-center mb-4">Informations de Carte Bancaire</h4>
                <form th:action="@{/achat/traiter/{evenementId}(evenementId=${achat.evenement.id})}" method="post">
                    <div class="mb-3">
                        <label for="cardNumber" class="form-label">Numéro de carte</label>
                        <input type="text" class="form-control" id="cardNumber" name="cardNumber" placeholder="1234 5678 9876 5432" required
                               pattern="\d{16}" title="Le numéro de carte doit contenir exactement 16 chiffres">
                    </div>
                    <div class="row">
                        <div class="col">
                            <label for="expiryDate" class="form-label">Date d'expiration</label>
                            <input type="month" class="form-control" id="expiryDate" name="expiryDate" required>
                        </div>
                        <div class="col">
                            <label for="cvv" class="form-label">Code de sécurité (CVV)</label>
                            <input type="text" class="form-control" id="cvv" name="cvv" placeholder="123" required
                                   pattern="\d{3}" title="Le CVV doit contenir exactement 3 chiffres">
                        </div>
                    </div>
                    <!-- Affichage du message d'erreur -->
                    <div th:if="${message}" class="alert alert-danger mt-3" role="alert">
                        <span th:text="${message}"></span>
                    </div>
                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-confirm">Confirmer et Payer</button>
                    </div>
                </form>


            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
