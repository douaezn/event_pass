<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background-image: url('/css/images/hh.png'); /* Chemin correct */
      background-size: cover;
      background-attachment: fixed;
      background-repeat: no-repeat;
      color: #fff;
    }

    .card {
      border-radius: 8px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      background-color: rgba(211, 211, 211, 0.7); /* Gris clair avec transparence */
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
    }

    h5.card-title {
      text-align: center;
      font-weight: bold;
      color: #333; /* Couleur sombre pour contraste */
    }

    p.card-text {
      color: #333; /* Texte sombre pour contraste */
    }

    .btn {
      margin-right: 5px;
    }

    .navbar {
      background-color: rgba(0, 0, 0, 0.85);
    }

    h2 {
      color: #f8f9fa;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Dashboard Admin</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" th:href="@{/evenements/ajouter}">Ajouter un Événement</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" th:href="@{/liste}">Voir la Liste des Utilisateurs</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-danger" th:href="@{/logout}">Se Déconnecter</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container mt-4">
    <!-- Affichage du message de succès -->
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
      <span th:text="${message}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Affichage du message d'erreur -->
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
      <span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

  <div class="container mt-4">
    <div class="row g-4">
      <!-- Exemple d'événement -->
      <div class="col-md-4" th:each="evenement : ${evenements}">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title" th:text="${evenement.titre}">Titre de l'Événement</h5>
            <p class="card-text">
              <strong>Description:</strong> <span th:text="${evenement.description}">Lorem ipsum</span><br>
              <strong>Date:</strong> <span th:text="${evenement.date}">2024-01-01</span><br>
              <strong>Lieu:</strong> <span th:text="${evenement.lieu}">Exemple Lieu</span><br>
              <strong>Capacité:</strong> <span th:text="${evenement.capacite}">100</span><br>
              <strong>Places Disponibles:</strong> <span th:text="${evenement.placesDisponibles}">100</span><br>
              <strong>Type:</strong> <span th:text="${evenement.type}">Conférence</span><br>
              <strong>Prix:</strong> <span th:text="${evenement.prix + ' DH'}">100</span>
            </p>
            <div class="d-flex justify-content-end">
              <a th:href="@{'/evenements/modifier/' + ${evenement.id}}" class="btn btn-warning btn-sm">
                <i class="fas fa-edit"></i>
              </a>
              <a th:href="@{'/evenements/supprimer/' + ${evenement.id}}"
                 class="btn btn-danger btn-sm ms-2"
                 onclick="return confirmerSuppression(event);">
                <i class="fas fa-trash"></i>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
<script>
  function confirmerSuppression(event) {
    event.preventDefault(); // Empêche le comportement par défaut du lien
    const confirmation = confirm("Êtes-vous sûr de vouloir supprimer cet événement ?");
    if (confirmation) {
      // Redirige vers le lien de suppression
      window.location.href = event.currentTarget.href;
    }
  }
</script>
</body>
</html>
