<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acheter des Tickets</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        body {
            background-image: url('/css/images/5.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #fff;
        }

        .card {
            background-color: rgba(201, 192, 203, 0.8);
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            padding: 20px;
        }

        .btn-buy {
            background-color: #a16cad;
            border: none;
            color: #fff;
            padding: 10px 15px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .btn-buy:hover {
            background-color: #9e75ac;
            color: #000;
        }
        .navbar {
          background-color: rgba(108, 117, 125, 0.9); /* Gris foncé avec transparence */
        }

        .navbar-brand {
          color: #fff;
        }

        .nav-link {
          color: #fff;
        }

        .nav-link:hover {
          color: #ddd;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="#">EventPass</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/evenements/accueil">Accueil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="/logout">Se Déconnecter</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <!-- Titre de l'événement -->
                <h3 class="text-center mb-4" th:text="'Acheter des tickets pour : ' + ${evenement.titre}">
                    Nom de l'Événement
                </h3>
                <form th:action="@{'/achat/acheter/' + ${evenement.id}}" method="post">
                    <!-- Nom -->
                    <div class="mb-3">
                        <label for="nom" class="form-label">Nom</label>
                        <input type="text" class="form-control" id="nom" name="nom" placeholder="Votre nom" required>
                    </div>
                    <!-- Email -->
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Votre email" required>
                    </div>
                    <!-- Quantité -->
                    <div class="mb-3">
                        <label for="quantite" class="form-label">Quantité de tickets</label>
                        <input type="number" class="form-control" id="quantite" name="quantite" min="1" placeholder="Nombre de tickets" required>
                    </div>
                    <!-- Prix estimé -->
                    <div th:if="${evenement.prix}" class="mb-3">
                        <label for="prixTotal" class="form-label">Prix total estimé</label>
                        <input type="text" class="form-control" id="prixTotal" th:value="${evenement.prix} + ' DH par ticket'" readonly>
                    </div>
                    <!-- Bouton d'achat -->
                    <div class="text-center">
                        <button type="submit" class="btn btn-buy">Procéder à l'Achat</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
